name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'

env:
  minrust: 1.70.0

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2025

        toolchain:
          - stable
          - beta
          - nightly

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install toolchain
        id: tc
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain || 'stable' }}
          profile: minimal
          override: true

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ steps.tc.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.toml') }}

      - name: Build with loaded feature (default)
        run: cargo build --workspace

      - name: Test with loaded feature (default)
        run: cargo test --workspace

      - name: Build with linked feature
        run: cargo build --workspace --no-default-features --features linked

      - name: Test with linked feature
        run: cargo test --workspace --no-default-features --features linked

      - name: Build with no default features
        run: cargo build --workspace --no-default-features

  rustfmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt
          profile: minimal
          override: true

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Run clippy
    runs-on: ubuntu-latest # TODO: Matrix to lint all platforms

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install toolchain
        id: tc
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ steps.tc.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.toml') }}

      - name: Run clippy (loaded, default)
        run: cargo clippy --workspace --all-targets -- -Dwarnings

      - name: Run clippy (linked)
        run: cargo clippy --workspace --all-targets --no-default-features --features linked -- -Dwarnings

  MSRV:
    runs-on: ubuntu-latest # TODO: Matrix to lint all platforms

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install toolchain (${{ env.minrust }})
        id: tc
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.minrust }}
          profile: minimal
          override: true

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msrv-${{ steps.tc.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.toml') }}

      # Ensure that it still builds, while allowing warnings
      - run: cargo check --workspace
      - run: cargo check --workspace --no-default-features --features linked

  doc:
    name: Build docs
    runs-on: ubuntu-latest # TODO: Matrix to build docs for platforms

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Install toolchain
        id: tc
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          override: true

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-docs-${{ steps.tc.outputs.rustc_hash }}-${{ hashFiles('**/Cargo.toml') }}

      - name: Build docs
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --workspace --no-deps --document-private-items

  generate-bindings:
    name: Generate nvngx-sys bindings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Clean
        run: rm -rf crates/nvngx-sys/src/bindings.rs
      - name: Install Vulkan SDK
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get install libvulkan-dev
      - name: Generate
        run: cargo b -p nvngx-sys -F generate-bindings
      - name: Diff generated Rust code
        run: test -z "$(git status --porcelain)" || (echo "::error::Generated files are different, please regenerate with cargo build -F generate-bindings!"; git diff; false)
